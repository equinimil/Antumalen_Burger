
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Antumalen Delivery Temuco</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
}

#map{
    width:100%;
    height:100vh;
}

.panel{
    position:absolute;
    top:10px;
    left:10px;
    z-index:9999;
    width:360px;
    background:white;
    padding:20px;
    border-radius:18px;
    box-shadow:0 4px 15px rgba(0,0,0,.25);
    transition:.3s ease;
}

/* panel minimizado */
.panel.minimizado{
    width:65px;
    height:65px;
    overflow:hidden;
    padding:10px;
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo h1{
    margin:0;
    font-size:30px;
}

.logo p{
    margin:5px 0;
    color:#666;
}

.burger-icon{
    font-size:42px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    cursor:pointer;
    font-size:16px;
}

/* botón minimizar */
.toggle-panel{
    position:absolute;
    top:10px;
    right:10px;
    width:42px;
    height:42px;
    border:none;
    border-radius:12px;
    background:#ff7a00;
    color:white;
    cursor:pointer;
    font-size:22px;
    padding:0;
    margin:0;
    z-index:99999;
}

.btn-calcular{
    background:#ff7a00;
    color:white;
}

.btn-instagram{
    background:#E1306C;
    color:white;
}

.resultado{
    margin-top:15px;
    background:#f5f5f5;
    border-radius:10px;
    padding:15px;
    line-height:1.7;
}

.small{
    margin-top:10px;
    color:#666;
    font-size:13px;
}

</style>
</head>

<body>

<div
class="panel"
id="panelPedido">

<button
class="toggle-panel"
onclick="togglePanel()">

☰

</button>

<div id="contenidoPanel">

<div class="logo">
<h1>🍔 Antumalen</h1>
<p>Despachos Temuco</p>
</div>

<h3>Calcular despacho</h3>

<input
id="direccion"
type="text"
placeholder="Ej: Av Alemania 450">

<input
id="pedido"
type="number"
placeholder="Monto pedido">

<button
class="btn-calcular"
onclick="buscarDireccion()">

Calcular despacho 🍔

</button>

<div
id="resultado"
class="resultado">

Esperando cálculo...

</div>

<a
href="https://www.instagram.com/antumalen_temuco/"
target="_blank">

<button class="btn-instagram">
Ver Instagram @antumalen_temuco
</button>

</a>

<p class="small">
Despacho calculado por kilómetros reales
según calles + protección por valor del pedido.
Tope máximo despacho: $2.500
</p>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// =======================
// CONFIG
// =======================

const centro = [-38.7298, -72.6378];

// negocio
const BASE_DESPACHO = 700;
const COSTO_POR_KM = 350;
const TOPE_DESPACHO = 2500;

const mapa =
L.map('map')
.setView(centro,12);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(mapa);

// =======================
// PIN HAMBURGUESA
// =======================

const burgerIcon =
L.divIcon({
html:"🍔",
className:"burger-icon",
iconSize:[40,40]
});

L.marker(
centro,
{
icon:burgerIcon
}
)
.addTo(mapa)
.bindPopup(
"🍔 Antumalen<br>Camino Botrolhue 1122"
);

let marcadorCliente;
let rutaActual;

// =======================
// MINIMIZAR PANEL
// =======================

function togglePanel(){

    const panel =
    document.getElementById(
        'panelPedido'
    );

    const contenido =
    document.getElementById(
        'contenidoPanel'
    );

    panel.classList.toggle(
        'minimizado'
    );

    const minimizado =
    panel.classList.contains(
        'minimizado'
    );

    contenido.style.display =
    minimizado
    ? 'none'
    : 'block';
}

// =======================
// BUSCAR DIRECCIÓN
// =======================

async function buscarDireccion(){

const direccion =
document
.getElementById(
'direccion'
)
.value
.trim();

const pedido =
parseFloat(
document
.getElementById(
'pedido'
)
.value
);

if(!direccion){

alert(
"Ingrese una dirección"
);

return;
}

if(
!pedido ||
pedido <= 0
){

alert(
"Ingrese un monto válido"
);

return;
}

// =======================
// GEOCODING
// =======================

const geoUrl =
`https://nominatim.openstreetmap.org/search?format=json&q=${direccion}, Temuco, Chile`;

const geoResponse =
await fetch(geoUrl);

const geoData =
await geoResponse.json();

if(
geoData.length === 0
){

alert(
"Dirección no encontrada"
);

return;
}

const lat =
parseFloat(
geoData[0].lat
);

const lon =
parseFloat(
geoData[0].lon
);

// limpiar ruta anterior
if(rutaActual){

mapa.removeLayer(
rutaActual
);

}

// limpiar marker
if(marcadorCliente){

mapa.removeLayer(
marcadorCliente
);

}

// marker cliente
marcadorCliente =
L.marker([lat,lon])
.addTo(mapa)
.bindPopup(direccion)
.openPopup();

// =======================
// RUTA REAL OSRM
// =======================

const routeUrl =
`https://router.project-osrm.org/route/v1/driving/${centro[1]},${centro[0]};${lon},${lat}?overview=full&geometries=geojson`;

const routeResponse =
await fetch(routeUrl);

const routeData =
await routeResponse.json();

if(
!routeData.routes ||
routeData.routes.length===0
){

alert(
"No se pudo calcular ruta"
);

return;
}

const route =
routeData.routes[0];

// km reales
const km =
route.distance / 1000;

// tiempo conducción min
const tiempoConduccion =
Math.round(
route.duration / 60
);

// =======================
// DIBUJAR RUTA
// =======================

const coords =
route.geometry.coordinates.map(
c => [c[1], c[0]]
);

rutaActual =
L.polyline(
coords,
{
weight:6,
opacity:0.8
}
)
.addTo(mapa);

mapa.fitBounds(
rutaActual.getBounds()
);

// =======================
// COSTO RUTA
// =======================

const costoRuta =
BASE_DESPACHO +
(
km *
COSTO_POR_KM
);

// =======================
// % SEGÚN PEDIDO
// =======================

let porcentajeMaximo;

if(pedido <= 4000){

porcentajeMaximo = 0.20;

}
else if(
pedido <= 7000
){

porcentajeMaximo = 0.25;

}
else if(
pedido <= 12000
){

porcentajeMaximo = 0.30;

}
else{

porcentajeMaximo = 0.35;

}

const topePorcentaje =
pedido *
porcentajeMaximo;

// =======================
// DESPACHO FINAL
// =======================

const despacho =
Math.min(
costoRuta,
topePorcentaje,
TOPE_DESPACHO
);

const total =
pedido +
despacho;

// tiempo entrega estimado
const tiempoEntrega =
tiempoConduccion + 15;

// =======================
// RESULTADO
// =======================

document
.getElementById(
'resultado'
)
.innerHTML =

`
<b>📍 Dirección:</b><br>
${direccion}

<br><br>

<b>🛣 Ruta real:</b>
${km.toFixed(2)} km

<br>

<b>🚗 Conducción:</b>
${tiempoConduccion} min

<br>

<b>🍔 Pedido:</b>
$${pedido.toLocaleString()}

<br>

<b>💸 Costo ruta:</b>
$${Math.round(
costoRuta
).toLocaleString()}

<br>

<b>🛵 Despacho final:</b>
$${Math.round(
despacho
).toLocaleString()}

<br>

<b>📊 Regla:</b>
máx ${(porcentajeMaximo*100)}%
del pedido y tope
$${TOPE_DESPACHO.toLocaleString()}

<br>

<b>⏱ Tiempo estimado:</b>
${tiempoEntrega} min

<br><br>

<b>💰 Total:</b>
$${Math.round(
total
).toLocaleString()}
`;

}

</script>

</body>
</html>
